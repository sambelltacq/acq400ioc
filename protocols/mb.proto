Terminator = LF;
ExtraInput = Ignore;
ReplyTimeout = 4000;

setMB {
# fin kHz, fout (setpoint)
	out "mb_clk %d %(A)d";
	in;
}

setMB_Hz {	
# fin Hz, fout (setpoint)
	out "mb_clk %e %(A)e";
	wait 1000;
	in;
	out "acq480_force_training 1";
	in;
}

setTrainReq {
	out "acq480_force_training %d";
	in;
}
getTrainReq {
	out "acq480_force_training";
	in "%d";
}

setSPAD {
# EN,LEN,DI4/32
	out "spad %i,%(\$1)i,%(\$2)i";
	in;
}

getSPAD {
# EN,LEN,DI4/32
	out "spad";
	in "%d,%(\$1)d,%(\$2)d";
}

# Qstats=BS_EMPTY, BS_FILLING, BS_FULL, BS_FULL_APP, DROPS
# in "%*d,%*d,%*d,%*d,%*d";
getQstatsEmpty {
	out "Qstats";
	in "%d,%(\$1:FILLING)d,%(\$1:FULL)d,%(\$1:FULL_APP)d,%(\$1:DROPS)d";
}


setContinuous {
	out "streamtonowhered %s";
}

setArm {
	out "set_arm";
	in;
}


getCState {
	out "cstate";
	in "STX %d %*d %*d %(\$1)d %*d";
}

setReboot {
	out "reboot=%d";
}

setPre {
	out "live_pre %d";
	in;
}

setPost {
	out "live_post %d";
	in;
}

get_live_mode {
	out "live_mode";
	in "%d";
}





set_fpctl {
	out "fpctl_\$1=%(RVAL)x";
	in;
}

get_fpctl {
	out "fpctl_\$1";
	in "%(RVAL)x";
}

set_zclk_src {
	out "zclk_sel=%(RVAL)x";
	in;
}

get_zclk_src {
	out "zclk_sel";
	in "%(RVAL)x";
}

getSitelist {
	out "SITELIST";
	in "%s";
}

store_optimise_bufferlen {
	out "optimise_bufferlen %(\$1)d %d";
	in;
}
setFitRtmTranslenBuffer {
	out "fit_rtm_translen_to_buffer %d";
	in;
}

setSoftTrigger {
	out "soft_trigger %d";
	in;
}

setSoftTriggerRepeat {
        out "soft_trigger %(B)d %d";
        in;
}

get_ssb {
	out "ssb";
	in "%d";
}

get_dssb {
	out "dssb";
	in "%d";
}
